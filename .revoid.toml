# revoid configuration for this repository (used by the CI review job).
# See `revoid config` for the full reference.

[guardrails]
# The CI review runs the reasoning model go/deepseek-v4-pro on whole-PR diffs.
# This model spends substantial time on hidden reasoning, so a moderate diff can
# run several minutes; allow up to 8 minutes so the review isn't cut short.
# (maxOutputTokens is handled by the raised built-in default — see src/model.ts.)
timeoutMs = 480000
